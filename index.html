<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Red Fort Museum</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#guideButton{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
padding:14px 22px;
background:#d32f2f;
color:white;
border:none;
border-radius:10px;
font-size:16px;
z-index:9999;
}
</style>

</head>

<body>

<button id="guideButton">Play Museum Guide</button>

<a-scene
mindar-image="imageTargetSrc: ./assets/target.mind;"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
>

<a-assets>
<a-asset-item id="redfort" src="./assets/red_fort.glb"></a-asset-item>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-entity
id="model"
gltf-model="#redfort"
position="0 0 0"
scale="0.4 0.4 0.4"
rotation="0 0 0">
</a-entity>

<a-text
value="Red Fort - Built in 1648 by Mughal Emperor Shah Jahan"
position="0 0.6 0"
align="center"
color="yellow"
width="2">
</a-text>

</a-entity>

</a-scene>

<script>

const model = document.querySelector("#model")

let startX
let rotationY = 0

document.addEventListener("touchstart", function(e){
startX = e.touches[0].clientX
})

document.addEventListener("touchmove", function(e){

let moveX = e.touches[0].clientX
let diff = moveX - startX

rotationY += diff * 0.2

model.setAttribute("rotation","0 "+rotationY+" 0")

startX = moveX

})

document.getElementById("guideButton").addEventListener("click",function(){

let text = "This is the Red Fort located in Delhi India. It was built in 1648 by the Mughal emperor Shah Jahan. The fort served as the residence of Mughal emperors for nearly two hundred years and is now a UNESCO World Heritage Site."

let speech = new SpeechSynthesisUtterance(text)

speech.lang="en-US"
speech.rate=0.9

window.speechSynthesis.speak(speech)

})

</script>

</body>
</html>
