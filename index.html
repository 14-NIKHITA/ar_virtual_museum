<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Red Fort Museum</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

/* Chat container */
#chatbox{
position:fixed;
right:10px;
bottom:10px;
width:260px;
height:320px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
z-index:9999;
}

/* messages area */
#messages{
flex:1;
padding:10px;
overflow-y:auto;
font-size:14px;
}

/* input area */
#inputArea{
display:flex;
border-top:1px solid #ddd;
}

#userInput{
flex:1;
border:none;
padding:8px;
outline:none;
}

#sendBtn{
background:#e53935;
color:white;
border:none;
padding:8px 12px;
}

.msgUser{
text-align:right;
margin:5px 0;
}

.msgBot{
text-align:left;
margin:5px 0;
color:#0d47a1;
}

</style>

</head>

<body>

<!-- CHAT UI -->

<div id="chatbox">

<div id="messages"></div>

<div id="inputArea">
<input id="userInput" placeholder="Ask about Red Fort">
<button id="sendBtn">Send</button>
</div>

</div>

<!-- AR SCENE -->

<a-scene
mindar-image="imageTargetSrc: ./assets/target.mind;"
color-space="sRGB"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets>
<a-asset-item id="redfort" src="./assets/red_fort.glb"></a-asset-item>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0">

<a-entity
id="model"
gltf-model="#redfort"
scale="0.4 0.4 0.4"
position="0 0 0"
rotation="0 0 0">
</a-entity>

<a-text
value="Red Fort - Mughal Monument"
position="0 0.6 0"
align="center"
color="yellow"
width="2">
</a-text>

</a-entity>

</a-scene>

<script>

/* ROTATE MODEL */

const model=document.querySelector("#model")

let startX
let rotationY=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchmove",e=>{

let moveX=e.touches[0].clientX
let diff=moveX-startX

rotationY+=diff*0.2

model.setAttribute("rotation","0 "+rotationY+" 0")

startX=moveX

})

/* CHATBOT */

const sendBtn=document.getElementById("sendBtn")
const userInput=document.getElementById("userInput")
const messages=document.getElementById("messages")

sendBtn.onclick=sendMessage

function sendMessage(){

let text=userInput.value.trim()

if(text==="") return

addMessage(text,"user")

let reply=botReply(text.toLowerCase())

setTimeout(()=>{
addMessage(reply,"bot")
speak(reply)
},500)

userInput.value=""

}

/* ADD MESSAGE TO CHAT */

function addMessage(text,type){

let div=document.createElement("div")

div.className= type==="user" ? "msgUser" : "msgBot"

div.innerText=text

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

/* SIMPLE NLP */

function botReply(q){

if(q.includes("who built"))
return "The Red Fort was built by the Mughal emperor Shah Jahan."

if(q.includes("when built") || q.includes("year"))
return "The Red Fort was constructed in the year 1648."

if(q.includes("where"))
return "The Red Fort is located in Delhi India."

if(q.includes("why famous"))
return "The Red Fort is famous as the residence of Mughal emperors and is a UNESCO World Heritage Site."

if(q.includes("history"))
return "The Red Fort served as the main residence of Mughal emperors for nearly two hundred years."

return "I am the virtual museum guide. Ask me about the Red Fort history."

}

/* SPEECH OUTPUT */

function speak(text){

let speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

window.speechSynthesis.speak(speech)

}

</script>

</body>
</html>
